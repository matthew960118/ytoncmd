name: CMake Multi-Platform Release Auto-Packager

# 觸發條件：當你建立並發布了一個新的 Release
on:
  release:
    types: [published]
  # 保留手動觸發與 push 測試，方便你想手動測試編譯
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # 三個平台同時開工！
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ytoncmd-linux
          - os: macos-latest
            artifact_name: ytoncmd-macos
          - os: windows-latest
            artifact_name: ytoncmd-windows.exe

    steps:
    - uses: actions/checkout@v4

    # ----------------------------------------------------
    # 依賴安裝區：根據不同作業系統，把 FFmpeg 給灌進去
    # ----------------------------------------------------
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y pkg-config ffmpeg libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev
    - name: Install Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Write-Host "Downloading FFmpeg 8.1.1 Windows Static Build..."
        $url = "https://github.com/GyanD/codexffmpeg/releases/download/8.1.1/ffmpeg-8.1.1-full_build.zip"
        $output = "ffmpeg.zip"
        
        $ProgressPreference = 'SilentlyContinue'
        
        Write-Host "Starting download from GitHub Releases..."
        Invoke-WebRequest -Uri $url -OutFile $output
        Write-Host "✓ Download complete. Extracting files..."
        
        # 1. 解壓到一個臨時目錄 temp_ffmpeg 裡
        Expand-Archive -Path $output -DestinationPath "temp_ffmpeg"
        
        # 2. 抓取內層真正的 FFmpeg SDK 目錄
        $innerDir = Get-ChildItem -Path "temp_ffmpeg" -Directory -Filter "ffmpeg-*-full_build" | Select-Object -First 1
        
        if ($innerDir) {
            # 3. 💡 正確的乾淨邏輯：
            # 先在臨時目錄裡把內層資料夾改名叫 ffmpeg-static
            $renamedPath = Rename-Item -Path $innerDir.FullName -NewName "ffmpeg-static" -PassThru
            
            # 再把改名後的整個資料夾直接移到專案根目錄下
            Move-Item -Path $renamedPath.FullName -Destination "." -Force
            Write-Host "✓ Successfully extracted and established ffmpeg-static directory structure."
        } else {
            Throw "Failed to locate inner FFmpeg directory structure!"
        }
        
        # 4. 清理壓縮包與暫存資料夾
        Remove-Item $output -Force
        if (Test-Path "temp_ffmpeg") { Remove-Item "temp_ffmpeg" -Recurse -Force }
    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install ffmpeg pkg-config cmake

    # ----------------------------------------------------
    # 配置與編譯區
    # ----------------------------------------------------
    # 3-1. Linux 專屬配置
    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-2. Windows 專屬配置
    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-3. macOS 專屬配置（只有它需要被餵 Homebrew 路徑）
    - name: Configure CMake (macOS)
      if: matrix.os == 'macos-latest'
      env:
        PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig
        PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    # ----------------------------------------------------
    # 自動上傳附件到你的 Release 頁面
    # ----------------------------------------------------
    - name: Upload Binaries to Release
      # 只有當你真正發布 Release 時，才會執行這個上傳動作
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        # 去 build 資料夾下尋找各平台編譯出的執行檔本體
        file: build/**/ytoncmd*
        file_glob: true
        tag: ${{ github.ref }}
        overwrite: true
