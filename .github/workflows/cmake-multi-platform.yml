name: CMake Multi-Platform Release Auto-Packager

# 觸發條件：當你建立並發布了一個新的 Release
on:
  release:
    types: [published]
  # 保留手動觸發與 push 測試，方便你想手動測試編譯
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # 三個平台同時開工！
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ytoncmd-linux
          - os: macos-latest
            artifact_name: ytoncmd-macos
          - os: windows-latest
            artifact_name: ytoncmd-windows.exe

    steps:
    - uses: actions/checkout@v4

    # ----------------------------------------------------
    # 依賴安裝區：根據不同作業系統，把 FFmpeg 給灌進去
    # ----------------------------------------------------
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y pkg-config ffmpeg libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev
    - name: Install Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Write-Host "Downloading FFmpeg Windows Static Build..."
        # 💡 這是 GyanD 官方永久不變的最新釋出靜態庫網址！
        $url = "https://github.com/GyanD/codexffmpeg/releases/download/8.1.1/ffmpeg-8.1.1-full_build.zip"
        $output = "ffmpeg.zip"
        
        # 隱藏進度條，下載速度直接飆升 5 倍
        $ProgressPreference = 'SilentlyContinue'
        
        Write-Host "Starting download from gyan.dev..."
        Invoke-WebRequest -Uri $url -OutFile $output
        Write-Host "✓ Download complete. Extracting files..."
        
        # 解壓縮到當前目錄
        Expand-Archive -Path $output -DestinationPath .
        
        # 自動捕捉解壓出來的資料夾（名字通常是 ffmpeg-7.x.x-full_build）
        $extractedDir = Get-ChildItem -Directory -Filter "ffmpeg-*-full_build" | Select-Object -First 1
        if ($extractedDir) {
            # 強制改名為我們 CMake 認得的固定名稱：ffmpeg-static
            Rename-Item -Path $extractedDir.FullName -NewName "ffmpeg-static"
            Write-Host "✓ Successfully extracted and renamed to ffmpeg-static"
        } else {
            Throw "Failed to locate extracted FFmpeg directory!"
        }
        
        Remove-Item $output
    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install ffmpeg pkg-config cmake

    # ----------------------------------------------------
    # 配置與編譯區
    # ----------------------------------------------------
    # 3-1. Linux 專屬配置
    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-2. Windows 專屬配置
    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-3. macOS 專屬配置（只有它需要被餵 Homebrew 路徑）
    - name: Configure CMake (macOS)
      if: matrix.os == 'macos-latest'
      env:
        PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig
        PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    # ----------------------------------------------------
    # 自動上傳附件到你的 Release 頁面
    # ----------------------------------------------------
    - name: Upload Binaries to Release
      # 只有當你真正發布 Release 時，才會執行這個上傳動作
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        # 去 build 資料夾下尋找各平台編譯出的執行檔本體
        file: build/**/ytoncmd*
        file_glob: true
        tag: ${{ github.ref }}
        overwrite: true
