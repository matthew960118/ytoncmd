name: CMake Multi-Platform Release Auto-Packager

# 觸發條件：當你建立並發布了一個新的 Release
on:
  release:
    types: [published]
  # 保留手動觸發與 push 測試，方便你想手動測試編譯
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # 三個平台同時開工！
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ytoncmd-linux
          - os: macos-latest
            artifact_name: ytoncmd-macos
          - os: windows-latest
            artifact_name: ytoncmd-windows.exe

    steps:
    - uses: actions/checkout@v4

    # ----------------------------------------------------
    # 依賴安裝區：根據不同作業系統，把 FFmpeg 給灌進去
    # ----------------------------------------------------
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y pkg-config ffmpeg libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev
    - name: Install Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Write-Host "Downloading True MSVC Static FFmpeg SDK from System233..."
        # 💡 使用你確認過的完全扁平化靜態包網址
        $url = "https://github.com/System233/ffmpeg-msvc-prebuilt/releases/download/n7.1-241205/ffmpeg-n7.1-241205-gpl-amd64-static.zip"
        $output = "ffmpeg.zip"
        $ProgressPreference = 'SilentlyContinue'
        
        # 1. 下載壓縮包
        Invoke-WebRequest -Uri $url -OutFile $output
        Write-Host "✓ Download complete. Extracting directly into target folder..."
        
        # 2. 💡 核心大魔法：直接解壓到名為 ffmpeg-static 的新資料夾中！
        # 這樣一解壓，include、lib 就會直接乖乖躺在裡面，沒有任何套娃層
        Expand-Archive -Path $output -DestinationPath ".\ffmpeg-static"
        
        # 3. 肉眼 Debug 驗證，百分之百確保 include 與 lib 真的躺在這裡
        Write-Host "=== Verifying ffmpeg-static contents ==="
        Get-ChildItem -Path ".\ffmpeg-static"
        Get-ChildItem -Path ".\ffmpeg-static\include\libavformat"
        
        # 4. 清理壓縮包
        Remove-Item $output -Force
    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install ffmpeg pkg-config cmake

    # ----------------------------------------------------
    # 配置與編譯區
    # ----------------------------------------------------
    # 3-1. Linux 專屬配置
    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-2. Windows 專屬配置
    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-3. macOS 專屬配置（只有它需要被餵 Homebrew 路徑）
    - name: Configure CMake (macOS)
      if: matrix.os == 'macos-latest'
      env:
        PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig
        PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    # ----------------------------------------------------
    # 自動上傳附件到你的 Release 頁面
    # ----------------------------------------------------
    - name: Upload Binaries to Release
      # 只有當你真正發布 Release 時，才會執行這個上傳動作
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        # 去 build 資料夾下尋找各平台編譯出的執行檔本體
        file: build/**/ytoncmd*
        file_glob: true
        tag: ${{ github.ref }}
        overwrite: true
