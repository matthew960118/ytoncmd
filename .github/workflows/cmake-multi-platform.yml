name: CMake Multi-Platform Release Auto-Packager

# 觸發條件：當你建立並發布了一個新的 Release（就是你剛剛點的那個發布）
on:
  release:
    types: [published]
  # 保留手動觸發與 push 測試，方便你想手動測試編譯
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # 這裡擴充成三個平台：Linux、Windows、Mac！
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ytoncmd-linux
          - os: macos-latest
            artifact_name: ytoncmd-macos
          - os: windows-latest
            artifact_name: ytoncmd-windows.exe

    steps:
    - uses: actions/checkout@v4

    # ----------------------------------------------------
    # 依賴安裝區：根據不同作業系統，把 FFmpeg 給灌進去
    # ----------------------------------------------------
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y pkg-config ffmpeg libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev

    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install ffmpeg pkg-config cmake

    # 註：Windows 交叉編譯通常依賴你專案內的 ffmpeg 套件包，此處讓 CMake 依據你原本的設定去抓

    # ----------------------------------------------------
    # 配置與編譯區
    # ----------------------------------------------------
    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    # ----------------------------------------------------
    # 自動上傳附件到你的 Release 頁面（大魔法所在！）
    # ----------------------------------------------------
    - name: Upload Binaries to Release
      # 只有當你真正發布 Release 時，才會執行這個上傳動作（push 或手動觸發時會跳過）
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        # 去 build 資料夾下尋找各平台編譯出的執行檔
        file: build/**/ytoncmd*
        file_glob: true
        tag: ${{ github.ref }}
        overwrite: true
