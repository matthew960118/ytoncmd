name: CMake Multi-Platform Release Auto-Packager

# 觸發條件：當你建立並發布了一個新的 Release
on:
  release:
    types: [published]
  # 保留手動觸發與 push 測試，方便你想手動測試編譯
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # 三個平台同時開工！
        # os: [ubuntu-latest, windows-latest, macos-latest]
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ytoncmd-linux
          # - os: macos-latest
          #   artifact_name: ytoncmd-macos
          - os: windows-latest
            artifact_name: ytoncmd-windows.exe

    steps:
    - uses: actions/checkout@v4

    # ----------------------------------------------------
    # 依賴安裝區：根據不同作業系統，把 FFmpeg 給灌進去
    # ----------------------------------------------------
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y pkg-config ffmpeg libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev
    - name: Download Full FFmpeg Shared/Dev package (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Write-Host "=== 開始下載 gyan.dev 全規格開發包 ==="
        # 建立一個乾淨的暫存夾
        New-Item -ItemType Directory -Force -Path "./ffmpeg-download"
        
        # 使用 gyan.dev 官方最新穩定版（或指定版本，這裡以 release-full-shared 為例）
        # 註：這包裡面帶有完整的 .lib 導入庫以及全開的軟體解碼器（包含 libdav1d）
        $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z"
        Invoke-WebRequest -Uri $url -OutFile "./ffmpeg-download/ffmpeg.7z"
        
        Write-Host "=== 正在解壓 7z 檔案 ==="
        # 使用 GitHub 虛擬機內建的 7z 進行解壓
        7z x "./ffmpeg-download/ffmpeg.7z" -o"./ffmpeg-download" -y
        
        # 尋找解壓出來的根目錄名字（它通常長得像 ffmpeg-7.1-full_shared 之類的）
        $ffmpegDir = Get-ChildItem -Directory -Path "./ffmpeg-download" | Select-Object -First 1
        
        Write-Host "=== 正在將完整版庫檔案對齊至專案 ffmpeg-static 目錄 ==="
        # 建立你 CMake 點名要的 ffmpeg-static 資料夾
        New-Item -ItemType Directory -Force -Path "./ffmpeg-static"
        
        # 物理複製 include 和 lib 進去，完美覆蓋！
        Copy-Item -Path "$($ffmpegDir.FullName)/include" -Destination "./ffmpeg-static/include" -Recurse -Force
        Copy-Item -Path "$($ffmpegDir.FullName)/lib" -Destination "./ffmpeg-static/lib" -Recurse -Force
        
        Write-Host "=== 檢查下載成果 ==="
        Get-ChildItem -Path "./ffmpeg-static/lib"
    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install ffmpeg pkg-config cmake

    # ----------------------------------------------------
    # 配置與編譯區
    # ----------------------------------------------------
    # 3-1. Linux 專屬配置
    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-2. Windows 專屬配置
    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release --fresh

    # 3-3. macOS 專屬配置（只有它需要被餵 Homebrew 路徑）
    - name: Configure CMake (macOS)
      if: matrix.os == 'macos-latest'
      env:
        PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig
        PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    # ----------------------------------------------------
    # 自動上傳附件到你的 Release 頁面
    # ----------------------------------------------------
    # - name: Upload Binaries to Release
    #   if: github.event_name == 'release'   # 💡 抓到犯人了！
    #   uses: svenstaro/upload-release-action@v2
    #   with:
    #     repo_token: ${{ secrets.GITHUB_TOKEN }}
    #     file: build/**/ytoncmd* # 💡 還有這裡！
    #     file_glob: true
    #     tag: ${{ github.ref }}
    #     overwrite: true
    - name: Upload Artifacts for Testing
      uses: actions/upload-artifact@v4
      with:
        name: ytoncmd-${{ matrix.os }}
        path: |
          build_win/ytoncmd-win-v1.1/Release/ytoncmd.exe
          build/ytoncmd-macos-v1.1/ytoncmd
          build/ytoncmd-linux-v1.1/ytoncmd
        if-no-files-found: ignore