name: CMake Multi-Platform Release Auto-Packager

# 觸發條件：當你建立並發布了一個新的 Release
on:
  release:
    types: [published]
  # 保留手動觸發與 push 測試，方便你想手動測試編譯
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # 三個平台同時開工！
        # os: [ubuntu-latest, windows-latest, macos-latest]
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ytoncmd-linux
          # - os: macos-latest
          #   artifact_name: ytoncmd-macos
          - os: windows-latest
            artifact_name: ytoncmd-windows.exe

    steps:
    - uses: actions/checkout@v4

    # ----------------------------------------------------
    # 依賴安裝區：根據不同作業系統，把 FFmpeg 給灌進去
    # ----------------------------------------------------
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y pkg-config ffmpeg libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev
    - name: Download Static FFmpeg package (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Write-Host "=== 下載 Windows/MSVC 靜態 FFmpeg 開發包 ==="
        New-Item -ItemType Directory -Force -Path "./ffmpeg-download"

        $url = "https://github.com/System233/ffmpeg-msvc-prebuilt/releases/download/n7.1-241205/ffmpeg-n7.1-241205-gpl-amd64-static.zip"
        Invoke-WebRequest -Uri $url -OutFile "./ffmpeg-download/ffmpeg-static.zip"

        Write-Host "=== 解壓靜態 FFmpeg 開發包 ==="
        Expand-Archive -Path "./ffmpeg-download/ffmpeg-static.zip" -DestinationPath "./ffmpeg-download" -Force
        $ffmpegRoot = Get-Item -Path "./ffmpeg-download"
        $ffmpegDir = @($ffmpegRoot) + @(Get-ChildItem -Directory -Path "./ffmpeg-download" -Recurse) | Where-Object {
          (Test-Path (Join-Path $_.FullName "include")) -and (Test-Path (Join-Path $_.FullName "lib"))
        } | Select-Object -First 1

        if (-not $ffmpegDir) {
          Write-Host "=== 解壓後的目錄清單 ==="
          Get-ChildItem -Path "./ffmpeg-download" -Directory -Recurse | Select-Object -First 80 FullName
          throw "Cannot find extracted FFmpeg directory containing include/ and lib/."
        }

        Write-Host "Using FFmpeg directory: $($ffmpegDir.FullName)"
        Write-Host "=== 對齊至 CMake 預期的 ffmpeg-static 目錄 ==="
        New-Item -ItemType Directory -Force -Path "./ffmpeg-static"
        Copy-Item -Path (Join-Path $ffmpegDir.FullName "include") -Destination "./ffmpeg-static/include" -Recurse -Force
        Copy-Item -Path (Join-Path $ffmpegDir.FullName "lib") -Destination "./ffmpeg-static/lib" -Recurse -Force

        Write-Host "=== 檢查靜態庫 ==="
        Get-ChildItem -Path "./ffmpeg-static/lib" -Filter "*.lib" | Select-Object Name
    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install ffmpeg pkg-config cmake

    # ----------------------------------------------------
    # 配置與編譯區
    # ----------------------------------------------------
    # 3-1. Linux 專屬配置
    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    # 3-2. Windows 專屬配置
    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release --fresh

    # 3-3. macOS 專屬配置（只有它需要被餵 Homebrew 路徑）
    - name: Configure CMake (macOS)
      if: matrix.os == 'macos-latest'
      env:
        PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig
        PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    # ----------------------------------------------------
    # 自動上傳附件到你的 Release 頁面
    # ----------------------------------------------------
    # - name: Upload Binaries to Release
    #   if: github.event_name == 'release'   # 💡 抓到犯人了！
    #   uses: svenstaro/upload-release-action@v2
    #   with:
    #     repo_token: ${{ secrets.GITHUB_TOKEN }}
    #     file: build/**/ytoncmd* # 💡 還有這裡！
    #     file_glob: true
    #     tag: ${{ github.ref }}
    #     overwrite: true
    - name: Upload Artifacts for Testing
      uses: actions/upload-artifact@v4
      with:
        name: ytoncmd-${{ matrix.os }}
        path: |
          build_win/ytoncmd-win-v1.1/Release/ytoncmd.exe
          build/ytoncmd-macos-v1.1/ytoncmd
          build/ytoncmd-linux-v1.1/ytoncmd
        if-no-files-found: ignore