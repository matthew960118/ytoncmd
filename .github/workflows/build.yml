name: Cross-Platform Build

# 觸發條件：當你 push 程式碼到 main 分支，或手動點擊執行時
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build for macOS
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies (Homebrew)
      run: |
        brew update
        brew install ffmpeg pkg-config cmake

    - name: Configure CMake
      run: |
        # 讓 CMake 透過 pkg-config 自動尋找 Mac 系統底層的 FFmpeg
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: |
        cmake --build build --config Release

    - name: Upload Artifact (產出物打包)
      uses: actions/upload-artifact@v4 # <-- 1. 修正套件名稱
      with:
        name: ytoncmd-mac
        # 2. 如果你的 CMake 會把產出放進 ytoncmd-linux-v1.0 這種自訂目錄，
        # 在 Mac 上可能也會生出 ytoncmd-macos-v1.0/ytoncmd。
        # 寫成底下這樣，可以確保只抓取最終那個「沒有副檔名」的 Mac 執行檔本體：
        path: |
          build/**/ytoncmd
          !build/**/*.cpp
          !build/**/*.o
